# Dependabot configuration
# Documentation:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2

updates:

  # Python package security and version updates
  - package-ecosystem: "pip"
    directory: "/"

    schedule:
      interval: "daily"

    cooldown:
      default-days: 14

    labels:
      - "dependencies"
      - "python"
      - "security"

    groups:
      python-dependencies:
        applies-to: version-updates
        update-types:
          - minor
          - patch

    rebase-strategy: "auto"

    commit-message:
      prefix: "deps"
      include: "scope"


  # GitHub Actions dependency updates
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"

    schedule:
      interval: "daily"

    cooldown:
      default-days: 7

    labels:
      - "dependencies"
      - "github-actions"
      - "security"

    commit-message:
      prefix: "ci"
      include: "scope"
