# Dependabot configuration (github bot )
# Documentation:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2

updates:
  # Keep Python dependencies up to date.
  - package-ecosystem: "pip"
    directory: "/"

    # Check for new releases every day.
    schedule:
      interval: "daily"

    # Wait 14 days before opening a version update PR.
    # This helps avoid upgrading to freshly released versions
    # that may still contain undiscovered regressions.
    cooldown:
      default-days: 14

    # Maximum number of open Dependabot pull requests.
    open-pull-requests-limit: 40

    # Apply labels to all Dependabot pull requests.
    labels:
      - "dependencies"
      - "python"

    # Group all Python dependency updates into a single pull request.
    groups:
      python-dependencies:
        applies-to: version-updates
        update-types:
          - major
          - minor
          - patch

    # Rebase pull requests automatically when conflicts occur.
    rebase-strategy: "auto"

    # Use conventional commit messages.
    commit-message:
      prefix: "deps"
      include: "scope"
