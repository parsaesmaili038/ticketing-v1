# ==============================================================================
# Dependency Review
# ==============================================================================
#
# Purpose
# -------
# Reviews dependency changes introduced by Pull Requests.
#
# Features
# --------
# ✔ Detects vulnerable package versions
# ✔ Reviews newly added or updated dependencies
# ✔ Posts a summary comment on Pull Requests
# ✔ Blocks merging when high-risk vulnerabilities are introduced
#
# This workflow NEVER modifies your repository.
#
# ==============================================================================

name: Dependency Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main

# ==============================================================================
# Permissions
# ==============================================================================

permissions:
  contents: read
  pull-requests: write

# ==============================================================================
# Jobs
# ==============================================================================

jobs:
  dependency-review:

    name: Dependency Review

    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:

      # ------------------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------------
      # Review dependency changes
      #
      # Scans dependency files modified in this Pull Request.
      # Reports vulnerable packages and license issues.
      # ------------------------------------------------------------------------

      - name: Analyze dependency changes
        uses: actions/dependency-review-action@v4

        with:

          # Always publish a summary in the Pull Request.
          comment-summary-in-pr: always

          # Retry snapshot retrieval if GitHub snapshot generation
          # has not completed yet.
          retry-on-snapshot-warnings: true

          # Fail the workflow when vulnerabilities of this severity
          # or higher are introduced.
          fail-on-severity: high

          # Example:
          # deny-licenses: GPL-1.0-or-later, LGPL-2.0-or-later
