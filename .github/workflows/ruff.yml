# ==============================================================================
# Ruff Code Quality
# ==============================================================================

name: Ruff Code Quality


on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  schedule:
    - cron: "0 0 * * 0"


# ==============================================================================
# Permissions
# ==============================================================================

permissions:

  contents: write
  pull-requests: write
  actions: read



# ==============================================================================
# Jobs
# ==============================================================================

jobs:

  ruff:

    name: Ruff Code Quality

    runs-on: ubuntu-latest


    steps:


      # ------------------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false



      # ------------------------------------------------------------------------
      # Setup Python
      # ------------------------------------------------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip



      # ------------------------------------------------------------------------
      # Setup Ruff
      # ------------------------------------------------------------------------

      - name: Setup Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: latest



      # ------------------------------------------------------------------------
      # Ruff Lint
      # ------------------------------------------------------------------------

      - name: Ruff Lint
        continue-on-error: true
        run: |
          ruff check . \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules \
            --output-format=github



      # ------------------------------------------------------------------------
      # Ruff Format Check
      # ------------------------------------------------------------------------

      - name: Ruff Format Check
        continue-on-error: true
        run: |
          ruff format . \
            --check \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules



      # ------------------------------------------------------------------------
      # Apply Ruff Fixes
      #
      # Changes are created locally only.
      # They are sent through Pull Request.
      # ------------------------------------------------------------------------

      - name: Apply Ruff Fixes
        if: always()
        continue-on-error: true
        run: |

          ruff check . \
            --fix \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules


          ruff format . \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules



      # ------------------------------------------------------------------------
      # Show Changes
      # ------------------------------------------------------------------------

      - name: Show Changes
        if: always()
        run: |
          git status
          git diff --stat



      # ------------------------------------------------------------------------
      # Detect Changes
      # ------------------------------------------------------------------------

      - name: Detect Changes
        id: changes
        if: always()
        run: |

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi



      # ------------------------------------------------------------------------
      # Create Pull Request
      #
      # Never modifies main directly.
      # ------------------------------------------------------------------------

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7

        with:

          token: ${{ secrets.GITHUB_TOKEN }}

          branch: automation/ruff/${{ github.run_id }}

          base: main

          delete-branch: true

          draft: false


          commit-message: |
            🤖✨ style(ruff): automated Python cleanup


          title: |
            🤖✨ Automated Ruff code cleanup


          body: |

            ## 🤖✨ Automated Ruff Cleanup

            This Pull Request was automatically generated by GitHub Actions using Ruff. 🚀


            ### 🛠️ Included changes

            - ✅ Ruff lint fixes
            - 🎨 Python formatting improvements
            - 📏 Code style improvements
            - 🔧 Safe automatic cleanup


            ### 🔍 Review

            - 👀 Manual review required
            - 🚫 No direct commits to `main`
            - 🚫 No automatic merge
            - 🌿 Changes isolated in a separate branch


            ### ⚙️ Generated by

            - 🧰 Tool: Ruff
            - 🤖 Platform: GitHub Actions
            - 🐍 Language: Python


            Please review before merging. 🙌


          labels: |
            automated
            ruff
            code-quality
            python
            needs-review
