# ==============================================================================
# Ruff Code Quality
# ==============================================================================
#
# Purpose
# -------
# Ruff is an extremely fast Python linter and formatter.
#
# This workflow automatically:
#
# ✔ Detects Python bugs
# ✔ Detects unused imports and variables
# ✔ Detects common performance issues
# ✔ Enforces Python code style
# ✔ Verifies formatting
# ✔ Applies safe automatic fixes
# ✔ Creates a Pull Request instead of modifying main directly
#
# IMPORTANT
# ---------
#
# • This workflow NEVER commits directly to main.
# • All automatic changes are isolated in a separate branch.
# • Every change requires manual Pull Request review.
#
# ==============================================================================

name: Ruff Code Quality


# ==============================================================================
# Workflow Triggers
# ==============================================================================

on:

  # Run after every push to main
  push:
    branches:
      - main

  # Run for every Pull Request targeting main
  pull_request:
    branches:
      - main

  # Weekly maintenance scan
  # Runs every Sunday at 00:00 UTC
  schedule:
    - cron: "0 0 * * 0"


# ==============================================================================
# Permissions
# ==============================================================================

permissions:

  # Required to create branches and commits for Pull Requests
  contents: write

  # Required to create Pull Requests
  pull-requests: write

  # Required for GitHub Actions information
  actions: read


# ==============================================================================
# Jobs
# ==============================================================================

jobs:

  ruff:

    name: Ruff Code Quality

    runs-on: ubuntu-latest


    steps:


      # ------------------------------------------------------------------------
      # Checkout repository
      #
      # Downloads the repository source code.
      #
      # persist-credentials=false prevents accidental direct pushes.
      # ------------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false



      # ------------------------------------------------------------------------
      # Setup Python
      #
      # Installs Python and enables pip cache.
      # ------------------------------------------------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip



      # ------------------------------------------------------------------------
      # Setup Ruff
      #
      # Uses the official Ruff GitHub Action.
      # ------------------------------------------------------------------------

      - name: Setup Ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: latest



      # ------------------------------------------------------------------------
      # Ruff Lint Check
      #
      # Detects:
      #
      # • Bugs
      # • Unused imports
      # • Bad patterns
      # • Code quality issues
      #
      # This step does NOT modify files.
      # ------------------------------------------------------------------------

      - name: Ruff Lint
        continue-on-error: true
        run: |
          ruff check . \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules \
            --output-format=github



      # ------------------------------------------------------------------------
      # Ruff Format Check
      #
      # Only checks formatting.
      # No files are changed.
      # ------------------------------------------------------------------------

      - name: Ruff Format Check
        continue-on-error: true
        run: |
          ruff format . \
            --check \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules



      # ------------------------------------------------------------------------
      # Apply Ruff Automatic Fixes
      #
      # Ruff applies safe fixes only.
      #
      # Changes are NOT pushed to main.
      # They are collected and sent through a Pull Request.
      # ------------------------------------------------------------------------

      - name: Apply Ruff Fixes
        if: always()
        continue-on-error: true
        run: |
          ruff check . \
            --fix \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules

          ruff format . \
            --exclude venv \
            --exclude .venv \
            --exclude node_modules



      # ------------------------------------------------------------------------
      # Check if Ruff changed anything
      # ------------------------------------------------------------------------

      - name: Detect Changes
        if: always()
        id: changes
        run: |

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi



      # ------------------------------------------------------------------------
      # Create Pull Request
      #
      # Creates a separate branch.
      #
      # main is NEVER modified directly.
      # ------------------------------------------------------------------------

      - name: Create Pull Request
        if: always() && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7

        with:

          token: ${{ secrets.GITHUB_TOKEN }}

          branch: automation/ruff/${{ github.run_id }}

          base: main

          delete-branch: true

          draft: false


          commit-message: |
            🤖✨ style(ruff): automated Python cleanup


          title: |
            🤖✨ Automated Ruff code cleanup


          body: |

            ## 🤖✨ Automated Ruff Cleanup

            This Pull Request was generated automatically by GitHub Actions using Ruff. 🚀


            ### 🛠️ Changes included

            - ✅ Ruff lint fixes
            - 🎨 Python formatting improvements
            - 📏 Code style improvements
            - 🔧 Safe automatic cleanup


            ### 🔍 Review

            - 👀 Manual review required
            - 🚫 No direct commits to `main`
            - 🚫 No automatic merge
            - 🌿 Changes isolated in a separate branch


            ### ⚙️ Generated by

            - 🧰 Tool: Ruff
            - 🤖 Platform: GitHub Actions
            - 🐍 Language: Python


            Please review before merging. 🙌


          labels: |
            automated
            ruff
            code-quality
            python
            needs-review
