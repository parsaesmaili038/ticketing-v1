# ==============================================================================
# Django Test Coverage
# ==============================================================================
#
# Purpose
# -------
# Runs Django tests and measures test coverage.
#
# Features
# --------
# ✔ Runs Django test suite
# ✔ Generates coverage reports
# ✔ Comments coverage result on Pull Requests
# ✔ Uploads HTML coverage report
# ✔ Fails when coverage is below threshold
#
# ==============================================================================

name: Django Coverage


on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened



# ==============================================================================
# Permissions
# ==============================================================================

permissions:

  contents: read
  pull-requests: write



# ==============================================================================
# Configuration
# ==============================================================================

env:

  COVERAGE_THRESHOLD: 80



# ==============================================================================
# Jobs
# ==============================================================================

jobs:


  coverage:


    name: Django Test Coverage


    runs-on: ubuntu-latest

    timeout-minutes: 15


    steps:


      # ------------------------------------------------------------------------
      # Checkout
      # ------------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4

        with:

          fetch-depth: 0



      # ------------------------------------------------------------------------
      # Python Setup
      # ------------------------------------------------------------------------

      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.14"

          cache: pip



      # ------------------------------------------------------------------------
      # Dependencies
      # ------------------------------------------------------------------------

      - name: Install dependencies

        run: |

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install coverage[toml]



      # ------------------------------------------------------------------------
      # Django Tests
      # ------------------------------------------------------------------------

      - name: Run Django tests with coverage

        run: |

          coverage run \
            --source=. \
            manage.py test

          coverage report

          coverage html

          coverage xml



      # ------------------------------------------------------------------------
      # Extract Coverage
      # ------------------------------------------------------------------------

      - name: Extract coverage percentage

        id: coverage

        run: |

          COVERAGE=$(coverage report | tail -1 | awk '{print $NF}' | tr -d '%')

          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"



      # ------------------------------------------------------------------------
      # Pull Request Comment
      # ------------------------------------------------------------------------

      - name: Comment coverage result

        if: github.event_name == 'pull_request'

        uses: actions/github-script@v7


        with:

          script: |

            const coverage =
            Number("${{ steps.coverage.outputs.percentage }}");


            const threshold =
            Number("${{ env.COVERAGE_THRESHOLD }}");


            const status =
            coverage >= threshold
            ? "✅ Coverage is healthy"
            : "⚠️ Coverage is below required level";


            const body = `

## 🧪 Django Coverage Report


| Metric | Result |
|---|---|
| 🧪 Coverage | **${coverage}%** |
| 🎯 Required | **${threshold}%** |
| 🐍 Framework | Django |
| 🤖 Generated | GitHub Actions |


### Status

${status}


### 📄 Reports

HTML coverage report is available in workflow artifacts.


> Automated quality check by GitHub Actions 🚀

`;


            github.rest.issues.createComment({

              owner: context.repo.owner,

              repo: context.repo.repo,

              issue_number: context.issue.number,

              body

            });



      # ------------------------------------------------------------------------
      # Upload Reports
      # ------------------------------------------------------------------------

      - name: Upload coverage reports

        uses: actions/upload-artifact@v4

        with:

          name: django-coverage-report

          path: |
            htmlcov/
            coverage.xml



      # ------------------------------------------------------------------------
      # Coverage Gate
      # ------------------------------------------------------------------------

      - name: Check coverage threshold

        run: |

          coverage report \
            --fail-under=${{ env.COVERAGE_THRESHOLD }}
