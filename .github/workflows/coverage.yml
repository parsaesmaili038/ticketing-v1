# ==============================================================================
# Django Test Coverage
# ==============================================================================
#
# Purpose
# -------
# Runs Django tests and measures code coverage.
#
# Features
# --------
# ✔ Runs Django test suite
# ✔ Generates coverage report
# ✔ Comments coverage result on Pull Requests
# ✔ Fails if coverage drops below threshold
# ✔ Uploads HTML report as artifact
#
# ==============================================================================

name: Django Coverage


on:

  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened



# ==============================================================================
# Permissions
# ==============================================================================

permissions:

  contents: read
  pull-requests: write



# ==============================================================================
# Jobs
# ==============================================================================

jobs:


  coverage:


    name: Django Test Coverage


    runs-on: ubuntu-latest


    steps:


      # ------------------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0



      # ------------------------------------------------------------------------
      # Setup Python
      # ------------------------------------------------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5
        with:

          python-version: "3.14"

          cache: pip



      # ------------------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------------------

      - name: Install dependencies
        run: |

          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          pip install coverage



      # ------------------------------------------------------------------------
      # Run Django Tests + Coverage
      # ------------------------------------------------------------------------

      - name: Run tests with coverage
        run: |

          coverage run manage.py test

          coverage report

          coverage html



      # ------------------------------------------------------------------------
      # Get Coverage Percentage
      # ------------------------------------------------------------------------

      - name: Extract Coverage Percentage
        id: coverage

        run: |

          COVERAGE=$(coverage report | tail -1 | awk '{print $NF}' | sed 's/%//')

          echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"



      # ------------------------------------------------------------------------
      # Comment Coverage Result on Pull Request
      # ------------------------------------------------------------------------

      - name: Comment Coverage Result

        if: github.event_name == 'pull_request'

        uses: actions/github-script@v7

        with:

          script: |

            const coverage = Number("${{ steps.coverage.outputs.percentage }}");


            let status;

            if (coverage >= 80) {

              status = "✅ Coverage is healthy";

            } else {

              status = "⚠️ Coverage is below recommended level";

            }


            const body = `
## 🧪 Django Test Coverage Report


| Metric | Result |
|---|---|
| 🧪 Test Coverage | **${coverage}%** |
| 🐍 Framework | Django |
| ⚙️ Generated By | GitHub Actions |


### Status

${status}


### 📄 Report

The full HTML coverage report is available in workflow artifacts.


### 🤖 Automation

Generated automatically by GitHub Actions.
Please review coverage changes before merging.
`;


            github.rest.issues.createComment({

              owner: context.repo.owner,

              repo: context.repo.repo,

              issue_number: context.issue.number,

              body

            });



      # ------------------------------------------------------------------------
      # Upload HTML Coverage Report
      # ------------------------------------------------------------------------

      - name: Upload Coverage HTML

        uses: actions/upload-artifact@v4

        with:

          name: django-coverage-report

          path: htmlcov/



      # ------------------------------------------------------------------------
      # Coverage Threshold
      # ------------------------------------------------------------------------

      - name: Check Coverage Threshold

        run: |

          coverage report --fail-under=80
